# Verificación automática en cada push/PR (refuerza el entregable profesional).
name: CI

on:
  push:
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eps-solicitudes-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Pytest
        run: python -m pytest -v

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eps-solicitudes-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: eps-solicitudes-web/package-lock.json
      - name: Instalar y compilar
        run: |
          npm ci
          npm run build
